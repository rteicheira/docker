# Website: n/a
# Container: https://ghcr.io/wg-easy/wg-easy
# GitHub: https://github.com/wg-easy/wg-easy

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    restart: unless-stopped
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    cap_add:
      - SYS_MODULE
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "ping", "-c", "3", "1.1.1.1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "51820:51820/udp"
      #- "51821:51821/tcp"
    volumes:
      - etc_wireguard:/etc/wireguard
    environment:
      WG_PORT: ${WG_PORT}
      PORT: ${PORT}
      PASSWORD_HASH: ${PASSWORD_HASH}
      WG_DEFAULT_DNS: ${WG_DEFAULT_DNS}
      WG_HOST: ${WG_HOST}
      LANG: ${LANG}
      WG_MTU: ${WG_MTU}
      WG_PERSISTENT_KEEPALIVE: ${WG_PERSISTENT_KEEPALIVE}
      UI_TRAFFIC_STATS: ${UI_TRAFFIC_STATS}
      UI_CHART_TYPE: ${UI_CHART_TYPE}
      WG_ALLOWED_IPS: ${WG_ALLOWED_IPS}
      WG_DEVICE: ${WG_DEVICE}
    networks:
      - default
      - nginprox

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  etc_wireguard:

networks:
  default: 
    external: true
    name: wireguard
  nginprox:
    external: true
    name: proxnet